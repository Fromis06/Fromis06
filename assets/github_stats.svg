            .metric-label { font: 600 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #ffffff; }
            .metric-value { font: bold 15px 'Segoe UI', Ubuntu, Sans-Serif; fill: #38bdae; }
        </style>
        
        <rect width="465" height="193" x="1" y="1" class="panel"/>
        
        <text x="25" y="35" class="title">Fromis06's GitHub Stats</text>
